<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Master - Quick Add</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-title">
        <span class="icon">🚀</span>
        <h1>Tab Master</h1>
      </div>
      <button id="openSettingsBtn" class="btn-icon" title="Manage Rules">⚙️</button>
    </div>
    
    <div class="content">
      <p class="description">Quickly create a rule for this tab.</p>
      
      <form id="quickAddForm" class="quick-form">
        <div class="form-group">
          <label>Condition</label>
          <div class="input-row">
            <select id="conditionType">
              <option value="startsWith">Starts with</option>
              <option value="endsWith">Ends with</option>
              <option value="contains">Contains</option>
              <option value="exact">Is exactly</option>
            </select>
            <input type="text" id="conditionValue" required>
          </div>
          <div id="suggestions" class="suggestions-container hidden"></div>
        </div>

        <div class="form-group">
          <label>New Tab Name</label>
          <input type="text" id="actionTitle" placeholder="Leave blank to keep original">
        </div>

        <div class="form-group">
          <label>New Icon (Emoji)</label>
          <input type="text" id="actionEmoji" placeholder="e.g. 💻" maxlength="5">
          <small class="hint">Use Dashboard for custom image uploads</small>
        </div>

        <button type="submit" id="saveRuleBtn" class="primary-btn">
          Save Quick Rule
        </button>
      </form>
      
      <div id="successMessage" class="success-message hidden">
        ✅ Rule saved successfully!
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
